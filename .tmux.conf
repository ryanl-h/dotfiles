set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"  # truecolor for modern terminals
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on                            # let vim/nvim see focus changes
setw -g mode-keys vi                              # vi keys in copy mode (matches pane bindings)

# Better splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'   # auto-restore last session when tmux starts


# Status bar
set -g status-position bottom
set -g status-style "bg=#1a1b26"

# Left: session name
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[bg=#1a1b26,fg=#7aa2f7]"
set -g status-left-length 30

# Windows
set -g window-status-format "#[fg=#565f89,bg=#1a1b26]  #I #W "
set -g window-status-current-format "#[bg=#3b4261,fg=#7aa2f7,bold]  #I #W "
set -g window-status-separator ""

# Right: path, date, time
set -g status-right "#[fg=#565f89] #{pane_current_path}  #[fg=#7aa2f7]%a %d %b  #[fg=#c0caf5,bold]%H:%M "
set -g status-right-length 120



run '~/.tmux/plugins/tpm/tpm'

